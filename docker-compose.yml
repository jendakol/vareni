services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: cooking
      POSTGRES_PASSWORD: cooking
      POSTGRES_DB: cookingapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

# To enable recipe discovery, download the all-MiniLM-L6-v2 model
# and mount it as a volume for the backend:
#  backend:
#    volumes:
#      - ./models/all-MiniLM-L6-v2:/models/all-MiniLM-L6-v2:ro
#    environment:
#      - EMBEDDING_MODEL_DIR=/models/all-MiniLM-L6-v2

volumes:
  pgdata:
